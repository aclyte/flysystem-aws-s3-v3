language: php

matrix:
  include:
    - php: 7.4
      dist: bionic
    - php: 8.0
      dist: focal
    - php: 8.1
      dist: focal
    - php: 8.2
      dist: jammy
    - php: 8.3
      dist: jammy
    - php: 8.4
      dist: jammy

install:
  - travis_retry composer install --no-interaction --prefer-dist

script:
  - find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
